[project]
name = "multi-task-rf-detr"
version = "0.1.0"
description = "RF-DETR multi-task fine-tuning pipeline for HULKs RoboCup perception (NAO -> Booster)."
readme = "README.md"
requires-python = ">=3.12,<3.13"
dependencies = [
  "rfdetr[train,loggers]>=1.7.1",
  "supervision>=0.28.0",
  "albumentations>=1.4",
  "onnx>=1.17",
  "onnx-simplifier>=0.4",
  "onnxruntime>=1.20",
  "pyyaml>=6.0",
  "tensorboard>=2.18",
  "matplotlib>=3.9",
  "tqdm>=4.66",
  "pillow>=11",
  "torch==2.5.1",
  "torchvision==0.20.1",
]

[dependency-groups]
dev = ["ruff>=0.15", "pyright>=1.1.400"]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.uv.sources]
torch = { index = "pytorch-cu124" }
torchvision = { index = "pytorch-cu124" }

[[tool.uv.index]]
name = "pytorch-cu124"
url = "https://download.pytorch.org/whl/cu124"
explicit = true
