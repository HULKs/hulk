name: Create pepsi release
on:
  push:
    tags:
      - "pepsi-v*.*.*"

jobs:
  make_release:
    name: "Append pepsi artifacts"
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]
    runs-on:
      ubuntu-latest
      # - self-hosted
      # - v3
    container:
      image: ghcr.io/hulks/hulk-ci:1.84.1
      # options: --user=1000:1000
      options: --user root

    steps:
      - uses: actions/checkout@v4
      - name: Build Pepsi
        run: |
          cargo build --target ${{ matrix.target }} --manifest-path tools/pepsi/Cargo.toml --release
          tar -czvf pepsi.${{ matrix.target }}.tar.gz target/${{ matrix.target }}/release/pepsi
      - name: Upload compiled artifact to release
        uses: softprops/action-gh-release@v2
        with:
          files: pepsi.${{ matrix.target }}.tar.gz
