name: Check Releases
on: push

jobs:
  releases:
    name: Check for releases
    if: startsWith(github.ref, 'refs/heads/')
    runs-on:
      ubuntu-latest
      # - self-hosted
      # - v3
    container:
      image: ghcr.io/hulks/hulk-ci:1.84.1
      # options: --user=1000:1000
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - name: Check for pepsi release
        id: pepsi_version
        uses: hulks/rust-release@v1.1
        with:
          title: pepsi
          token: ${{ secrets.GITHUB_TOKEN }}
          cargo: tools/pepsi/Cargo.toml
          dry_run: false
      - name: Debug
        run: |
          echo ${{ steps.pepsi_version.outputs.is_new_version }}
          echo ${{ steps.pepsi_version.outputs.version }}
      - name: Push Tag
        if: ${{ steps.pepsi_version.outputs.is_new_version == 'true' }}
        uses: rickstaa/action-create-tag@v1
        with:
          tag: pepsi-v${{ steps.pepsi_version.outputs.version }}
