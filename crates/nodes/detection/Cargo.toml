ros-z = { workspace = true }
ros-z-streams = { workspace = true }
ros2 = { workspace = true }
serde = { workspace = true, features = ["derive"] }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "signal"] }
types = { workspace = true }

[features]
ort-dynamic = ["ort/load-dynamic"]
