[package]
name = "ros-z"
version.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true

[lib]
crate-type = ["lib"]

[dependencies]
arc-swap = { workspace = true }
byteorder = { workspace = true }
event-listener = { workspace = true }
flume = { workspace = true }
json5 = { workspace = true }
nalgebra = { workspace = true, features = ["serde-serialize"], optional = true }
parking_lot = { workspace = true }
paste = { workspace = true }
ros-z-cdr = { workspace = true }
ros-z-codegen = { workspace = true, optional = true }
ros-z-derive = { workspace = true }
ros-z-protocol = { workspace = true, features = ["std"] }
ros-z-schema = { workspace = true }
serde = { workspace = true, features = ["serde_derive"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
slab = { workspace = true }
strum = { workspace = true, features = ["derive"] }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "signal"] }
tokio-util = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
zenoh = { workspace = true, default-features = false, features = [
  "transport_tcp",
  "unstable",
  "internal",
  "shared-memory",
] }
zenoh-buffers = { workspace = true }
zenoh-ext = { workspace = true }

[dev-dependencies]
ros-z-codegen = { workspace = true }
ros-z-msgs = { workspace = true }
serial_test = { workspace = true }
trybuild = { workspace = true }

[features]
default = ["config-builders"]
config-builders = []
# Dynamic message schema loading from .msg files (optional)
dynamic-schema-loader = ["ros-z-codegen"]
nalgebra = ["dep:nalgebra"]
# NOTE: Examples that use ros-z-msgs must be built from workspace root
# since ros-z-msgs depends on ros-z (circular dependency prevents direct dependency)

[[example]]
name = "pubsub_talker"
path = "examples/pubsub/talker.rs"
required-features = []

