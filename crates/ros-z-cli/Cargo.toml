[package]
name = "ros-z-cli"
version.workspace = true
edition.workspace = true
description = "Scriptable command-line companion to ros-z"
license.workspace = true
homepage.workspace = true

[[bin]]
name = "rosz"
path = "src/main.rs"

[dependencies]
clap = { workspace = true, features = ["derive"] }
color-eyre = { workspace = true }
ros-z = { workspace = true }
ros-z-protocol = { workspace = true, features = ["std"] }
ros-z-record = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = [
  "macros",
  "rt-multi-thread",
  "signal",
  "time",
] }
tokio-util = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
zenoh = { workspace = true, features = ["transport_tcp", "unstable", "internal"] }
